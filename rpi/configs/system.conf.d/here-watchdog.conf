# Hardware watchdog: if systemd doesn't ping /dev/watchdog0 every 15 s,
# the BCM2711 hardware watchdog triggers a hard reset. This catches
# kernel hangs and total system lockups — important when the box runs
# in playa heat with no operator.
#
# RebootWatchdogSec controls the same mechanism during shutdown.
[Manager]
RuntimeWatchdogSec=15
RebootWatchdogSec=2min
